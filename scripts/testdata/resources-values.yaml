# Values used by chart-tests.sh (render assertions) and chart-e2e.sh
# (real-cluster reconciliation). Every entry must be able to reach
# ready=true against the bootstrapped "prod" ClusterConnection.
connection:
  clusterRef: prod

buckets:
  - name: app-data
    versioning: true
    quotaBytes: 10485760

policies:
  - name: app-data-rw
    document:
      Version: "2012-10-17"
      Statement:
        - Effect: Allow
          Action: ["s3:GetObject", "s3:PutObject"]
          Resource: ["arn:aws:s3:::app-data/*"]
        # required for the user to manage its own access keys
        - Effect: Allow
          Action:
            - admin:CreateServiceAccount
            - admin:ListServiceAccounts
            - admin:RemoveServiceAccount
          Resource: ["arn:aws:s3:::*"]

users:
  - name: ci-user
    policies: ["app-data-rw"]
    password: chart-e2e-password-123

accessKeys:
  - name: ci-key
    user: ci-user
    passwordFromUser: ci-user
    description: chart e2e key
