apiVersion: v1
kind: ServiceAccount
metadata:
  name: rustfs-operator
  namespace: rustfs-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rustfs-operator
rules:
  - apiGroups: ["rustfs.com"]
    resources: ["buckets", "users", "policies", "accesskeys"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["rustfs.com"]
    resources: ["buckets/status", "users/status", "policies/status", "accesskeys/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["rustfs.com"]
    resources: ["clusterconnections"]
    verbs: ["get", "list", "watch"]
  # read connection/password secrets, write AccessKey credential secrets
  # (can be scoped per namespace; see the Helm chart's rbac.secretNamespaces)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rustfs-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rustfs-operator
subjects:
  - kind: ServiceAccount
    name: rustfs-operator
    namespace: rustfs-operator
