{{- $seen := dict }}
{{- range .Values.users }}
{{- $name := include "rustfs-resources.entryName" (dict "entry" . "seen" $seen "kind" "users") }}
{{- $id := printf "users[%s]" $name }}
{{- $inlinePassword := .password | default "" }}
{{- $ref := .passwordRef | default dict }}
{{- $refName := $ref.name | default "" }}
{{- if and (ne $inlinePassword "") (ne $refName "") }}
{{- fail (printf "%s: set either passwordRef or inline password, not both" $id) }}
{{- end }}
{{- if and (eq $inlinePassword "") (eq $refName "") }}
{{- fail (printf "%s: a password source is required; set passwordRef (existing Secret) or password (chart-created)" $id) }}
{{- end }}
{{- $secretName := ternary $refName (printf "%s-user-%s" $.Release.Name $name) (ne $refName "") }}
---
apiVersion: rustfs.com/v1alpha1
kind: User
metadata:
  name: {{ $name }}
  labels:
    {{- include "rustfs-resources.labels" $ | nindent 4 }}
spec:
  {{- include "rustfs-resources.connection" (dict "root" $ "entry" . "id" $id) | nindent 2 }}
  {{- with .username }}
  username: {{ . | quote }}
  {{- end }}
  passwordRef:
    name: {{ $secretName }}
    {{- if ne $refName "" }}
    {{- with $ref.key }}
    key: {{ . }}
    {{- end }}
    {{- end }}
  {{- with .policies }}
  policies:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- if hasKey . "enabled" }}
  enabled: {{ .enabled }}
  {{- end }}
  {{- include "rustfs-resources.deletionPolicy" (dict "entry" . "id" $id) | nindent 2 }}
{{- if eq $refName "" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "rustfs-resources.labels" $ | nindent 4 }}
type: Opaque
stringData:
  password: {{ $inlinePassword | quote }}
{{- end }}
{{- end }}
