replicaCount: 1

image:
  repository: ghcr.io/openprojectx/rustfs-operator
  # defaults to the chart appVersion
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

rbac:
  create: true
  # Grants cluster-wide Secret access (read for connection.secretRef and
  # User/AccessKey passwordRef; write for AccessKey credential Secrets).
  # Set to false for least privilege and list the application namespaces
  # that hold RustFS resources in secretNamespaces instead.
  clusterWideSecrets: true
  # Namespaces (besides the release namespace, always included) where the
  # operator gets a namespaced Role for Secret access. Only relevant when
  # clusterWideSecrets is false.
  secretNamespaces: []

# Optionally declare ClusterConnection resources (and their admin
# credentials Secrets) inline. Off by default; see the chart README.
# WARNING: inline accessKey/secretKey end up in the Helm release values —
# prefer `existingSecret` (sealed/external secret) in production.
clusterConnections: []
# clusterConnections:
#   - name: prod                    # required, cluster-scoped resource name
#     endpoint: http://rustfs.storage.svc:9000   # required
#     region: ""                    # optional
#     insecure: false               # optional
#     allowedNamespaces: []         # optional; empty/omitted = all namespaces
#     credentials:
#       # EITHER inline (chart creates the Secret in the release namespace):
#       create: true                # default true
#       secretName: ""              # default "<fullname>-<name>-admin"
#       accessKey: ""
#       secretKey: ""
#       # OR reference an existing Secret with accessKey/secretKey keys:
#       existingSecret: ""

# value for RUST_LOG
logLevel: info

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
